name: "iot_fault_diagnosis_env"
version: "1.0.0"
description: "Simulates industrial machines with sensor streams for fault diagnosis. Agents must analyze time-series sensor data (temperature, pressure, vibration) and diagnose faults in real-world industrial settings."
category: "fault_diagnosis"
author: "openenv-submission"
tasks:
  - id: "easy"
    description: "Clear anomaly (temperature spike), single-sensor reasoning. Agent must identify cooling system failure."
  - id: "medium"
    description: "Multi-sensor interaction requiring correlation reasoning. Vibration increase followed by pressure drop indicates bearing degradation."
  - id: "hard"
    description: "Missing values, noisy/conflicting signals, ambiguous fault. Rotor seizure with severed vibration sensor line."
api:
  port: 7860
  endpoints:
    reset: "/reset"
    step: "/step"
    state: "/state"
    tasks: "/tasks"
    grader: "/grader"
observation_space:
  type: "dict"
  description: "Time-series sensor readings (temperature, pressure, vibration), system metadata, and action history."
action_space:
  type: "dict"
  description: "Either request_data to advance time index, or diagnose with diagnosis, root_cause, confidence, recommended_action, explanation."
reward_range: [0.0, 1.0]
metadata:
  observation_type: "timeseries"
  action_type: "discrete+text"
  real_world_task: true
  graded: true
