name: "iot_fault_diagnosis_env"
version: "1.0.0"
description: "Simulates industrial machines with sensor streams for fault diagnosis. Agents must analyze time-series sensor data (temperature, pressure, vibration) and diagnose faults in real-world industrial settings."
category: "fault_diagnosis"
author: "openenv-submission"
tasks:
  - id: "normal"
    description: "Healthy baseline pump — all sensors flat within normal ranges. Agent must correctly identify Normal Operation without false alarms."
  - id: "easy"
    description: "Clear temperature spike (steps 15-35) on a pump while pressure and vibration remain stable. Agent must identify Cooling system failure."
  - id: "medium"
    description: "Sustained linear pressure drift on a Gas Turbine starting from step 10. Agent must identify Pressure sensor drift due to calibration decay."
  - id: "hard"
    description: "Intermittent vibration spikes on a Centrifugal Compressor with 15% missing values and noisy signals. Agent must identify Intermittent electrical fault in vibration sensor."
api:
  port: 7860
  endpoints:
    reset: "/reset"
    step: "/step"
    state: "/state"
    tasks: "/tasks"
    grader: "/grader"
observation_space:
  type: "dict"
  description: "Time-series sensor readings (temperature, pressure, vibration), system metadata including normal_ranges, energy_consumption, latency, and action history."
action_space:
  type: "dict"
  description: "request_data (advance time window), tool_call (analyze/denoise_signal/set_sampling_rate), or diagnose (terminal — submit diagnosis with all required fields)."
reward_range: [0.0, 1.0]
metadata:
  observation_type: "timeseries"
  action_type: "discrete+text"
  real_world_task: true
  graded: true
